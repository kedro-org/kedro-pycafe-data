name: Kedro-Viz

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - run: uv sync --locked --group dev

      - uses: kedro-org/publish-kedro-viz@v3
        with:
          python_manager: uv
          telemetry_consent: true
          auto_deploy: ${{ github.event_name != 'pull_request' }}
