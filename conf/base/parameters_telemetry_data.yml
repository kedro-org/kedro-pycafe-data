# How many of the most-recent monthly cohorts to suppress from the cohort
# retention output. Recent cohorts have an unstable cohort_size because
# late-qualifiers (users who eventually exceed the >8-day activity span) keep
# joining the cohort retroactively. Two months gives those denominators time
# to settle.
cohort_trailing_hide_months: 2

plugins:
  - "kedro mlflow"
  - "kedro docker"
  - "kedro airflow"
  - "kedro databricks"
  - "kedro azureml"
  - "kedro vertexai"
  - "kedro gql"
  - "kedro boot"
  - "kedro sagemaker"
  - "kedro coda"
  - "kedro kubeflow"

commands:
  - "kedro run"
  - "kedro viz"
  - "kedro new"
  - "kedro pipeline"
  - "kedro jupyter"
  - "kedro ipython"
  - "kedro package"

# Drop per-dataset GenAI/experimental usage rows with fewer than this many distinct
# users (k-anonymity); the ALL-* roll-up rows are exempt. Default 1 keeps every row
# while these datasets are new and counts are tiny — raise to 2-3 before exposing the
# dashboard more widely so no chart can reveal a single user.
genai_min_users: 1
